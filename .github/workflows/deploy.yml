name: Deploy

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Validate release build inputs
        env:
          ELIXIR_BASE_DIGEST: ${{ vars.ELIXIR_BASE_DIGEST }}
          DEBIAN_BASE_DIGEST: ${{ vars.DEBIAN_BASE_DIGEST }}
          NARSIL_VERSION: ${{ vars.NARSIL_VERSION }}
          NARSIL_SHA256: ${{ vars.NARSIL_SHA256 }}
          NARSIL_EXPECTED_VERSION: "1.7.0"
        run: |
          : "${ELIXIR_BASE_DIGEST:?ELIXIR_BASE_DIGEST repository variable is required}"
          : "${DEBIAN_BASE_DIGEST:?DEBIAN_BASE_DIGEST repository variable is required}"
          : "${NARSIL_VERSION:?NARSIL_VERSION repository variable is required}"
          : "${NARSIL_SHA256:?NARSIL_SHA256 repository variable is required}"
          test "${NARSIL_VERSION}" = "${NARSIL_EXPECTED_VERSION}" || {
            echo "NARSIL_VERSION must be ${NARSIL_EXPECTED_VERSION}, got ${NARSIL_VERSION}" >&2
            exit 1
          }

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ELIXIR_BASE_DIGEST=${{ vars.ELIXIR_BASE_DIGEST }}
            DEBIAN_BASE_DIGEST=${{ vars.DEBIAN_BASE_DIGEST }}
            NARSIL_VERSION=${{ vars.NARSIL_VERSION }}
            NARSIL_SHA256=${{ vars.NARSIL_SHA256 }}

      - name: Smoke test image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          # Basic startup check — image loads and binary exists
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            bin/krait version || echo "Version command not available, image built OK"
