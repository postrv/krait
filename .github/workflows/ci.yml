name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  DATABASE_URL: ecto://postgres:postgres@localhost/krait_test
  ELIXIR_VERSION: "1.17"
  OTP_VERSION: "27"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Elixir quality gates
  # ---------------------------------------------------------------------------
  quality:
    name: Quality Gates (Elixir)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        id: elixir-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo static analysis
        run: mix credo

      - name: Run unit tests
        run: mix test --exclude integration --exclude docker --exclude narsil --exclude pgvector

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-quality
          path: _build/test/lib/krait/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Rust NIF compilation & linting
  # ---------------------------------------------------------------------------
  rust_nif:
    name: Rust NIF (check + clippy + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: native/krait_analyzer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-

      - name: Cargo check
        run: cargo check

      - name: Cargo clippy (warnings as errors)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests (only on push to main)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, rust_nif]
    if: github.event_name == 'push'
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run integration tests
        run: mix test --only integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: _build/test/lib/krait/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: Security / dependency audit
  # ---------------------------------------------------------------------------
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Audit Hex dependencies
        run: mix hex.audit

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Cargo dependencies
        working-directory: native/krait_analyzer
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Job 5: Immutable path guard (agent PRs only)
  # ---------------------------------------------------------------------------
  immutable-check:
    name: Immutable Path Guard
    runs-on: ubuntu-latest
    # v23 M-8: Run for all PRs, not just krait-bot
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check immutable paths
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          while IFS= read -r path; do
            # Skip comments and empty lines
            [[ "$path" =~ ^#.*$ ]] && continue
            [[ -z "$path" ]] && continue
            # v23 M-8: Use -qF for fixed-string match (path was treated as regex)
            if echo "$CHANGED" | grep -qF "$path"; then
              echo "ERROR: Agent modified immutable path: $path"
              exit 1
            fi
          done < .krait-immutable
          echo "Immutable paths check passed"

  # ---------------------------------------------------------------------------
  # Job 6: Dialyzer type checking
  # ---------------------------------------------------------------------------
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Create PLTs dir
        run: mkdir -p priv/plts

      - name: Build PLT
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format github

  # ---------------------------------------------------------------------------
  # Job 7: Dockerfile pinning check
  # ---------------------------------------------------------------------------
  dockerfile-check:
    name: Dockerfile Pinning Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile base image pinning
        run: |
          for f in docker/Dockerfile.*; do
            if grep -E '^FROM ' "$f" | grep -v '@' | grep -v '^FROM scratch'; then
              echo "ERROR: $f has unpinned FROM" && exit 1
            fi
          done
          echo "All Dockerfiles use pinned base images"
