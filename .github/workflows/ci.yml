name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

env:
  MIX_ENV: test
  DATABASE_URL: ecto://postgres:postgres@localhost/krait_test
  ELIXIR_VERSION: "1.17"
  OTP_VERSION: "27"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Elixir quality gates
  # ---------------------------------------------------------------------------
  quality:
    name: Quality Gates (Elixir)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        id: elixir-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo static analysis
        run: mix credo

      - name: Run unit tests
        run: mix test --exclude integration --exclude docker --exclude narsil --exclude pgvector

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-quality
          path: _build/test/lib/krait/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Rust NIF compilation & linting
  # ---------------------------------------------------------------------------
  rust_nif:
    name: Rust NIF (check + clippy + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: native/krait_analyzer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-

      - name: Cargo check
        run: cargo check

      - name: Cargo clippy (warnings as errors)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests (only on push to main)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, rust_nif]
    if: github.event_name == 'push'
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run integration tests
        run: mix test --only integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: _build/test/lib/krait/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: Security / dependency audit
  # ---------------------------------------------------------------------------
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Audit Hex dependencies
        run: mix hex.audit

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Cargo dependencies
        working-directory: native/krait_analyzer
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Job 5: Immutable path guard
  # ---------------------------------------------------------------------------
  # Default: any PR (agent or human) that touches a `.krait-immutable` path is
  # rejected. A "Constitutional Convention" bypass requires TWO factors:
  #   1. PR author is in `AUTHORIZED_HUMANS` (hardcoded human maintainer
  #      allowlist below). Bots and external contributors cannot satisfy this.
  #   2. `constitutional-convention` label is applied to the PR. Only users
  #      with write access can apply labels; this gives the human a deliberate
  #      second action and an audit-visible signal.
  #
  # The job always runs to completion (no job-level `if:` skip) and prints a
  # full audit log of which immutable paths were modified, who the PR author
  # is, and whether each factor was satisfied — so every bypass leaves a
  # permanent record in Actions logs.
  #
  # GitHub control-plane files (`.github/`) are listed in `.krait-immutable`,
  # so modifying this guard, CODEOWNERS, Dependabot config, or the human
  # allowlist is itself a Constitutional Convention change.
  immutable-check:
    name: Immutable Path Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # v23 M-8: Run for all PRs, not just krait-bot
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check immutable paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CONSTITUTIONAL_LABEL_PRESENT: ${{ contains(github.event.pull_request.labels.*.name, 'constitutional-convention') }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
        run: |
          set -euo pipefail

          # Authorized Constitutional Convention authors. Adding to this list
          # is itself a Constitutional Convention change (this file is in
          # .krait-immutable). Keep small; expand only by deliberate PR.
          AUTHORIZED_HUMANS="postrv"
          BASE_MANIFEST="$(mktemp)"

          if ! git cat-file -e "${BASE_SHA}^{commit}"; then
            echo "::error::Base commit ${BASE_SHA} is not available in the checkout."
            exit 1
          fi

          if ! git show "${BASE_SHA}:.krait-immutable" > "${BASE_MANIFEST}"; then
            echo "::error::Unable to read .krait-immutable from base commit ${BASE_SHA}."
            exit 1
          fi

          matches_immutable_path() {
            local changed_path="$1"
            local immutable_path="$2"

            if [[ "$immutable_path" == */ ]]; then
              [[ "$changed_path" == "$immutable_path"* ]]
            else
              [[ "$changed_path" == "$immutable_path" ]]
            fi
          }

          # Compute which immutable paths this PR modifies. The manifest must
          # come from the base branch, not from the PR checkout; otherwise a PR
          # could delete its own guard entries before this job reads them.
          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")
          VIOLATIONS=""
          while IFS= read -r changed_path; do
            [[ -z "$changed_path" ]] && continue

            while IFS= read -r immutable_path; do
              [[ "$immutable_path" =~ ^#.*$ ]] && continue
              [[ -z "$immutable_path" ]] && continue

              if matches_immutable_path "$changed_path" "$immutable_path"; then
                VIOLATIONS="${VIOLATIONS}${changed_path} (matches: ${immutable_path})"$'\n'
              fi
            done < "${BASE_MANIFEST}"
          done <<< "$CHANGED"

          HAS_LABEL=false
          if [ "$CONSTITUTIONAL_LABEL_PRESENT" = "true" ]; then
            HAS_LABEL=true
          fi

          IS_AUTHORIZED_HUMAN=false
          for name in $AUTHORIZED_HUMANS; do
            if [ "$PR_AUTHOR" = "$name" ]; then
              IS_AUTHORIZED_HUMAN=true
              break
            fi
          done

          echo "=== Immutable Path Guard — Audit ==="
          echo "Base manifest commit: ${BASE_SHA}"
          echo "PR author: ${PR_AUTHOR} (${PR_AUTHOR_ASSOC})"
          echo "Author in human allowlist: ${IS_AUTHORIZED_HUMAN}"
          echo "Label 'constitutional-convention' present: ${HAS_LABEL}"
          if [ -z "$VIOLATIONS" ]; then
            echo "Immutable paths modified: none"
            echo "===================================="
            echo "No immutable paths modified."
            exit 0
          fi
          echo "Immutable paths modified:"
          printf '%s' "$VIOLATIONS" | sed 's/^/  /'
          echo "===================================="

          if [ "$HAS_LABEL" = true ] && [ "$IS_AUTHORIZED_HUMAN" = true ]; then
            echo "::notice::Constitutional Convention authorized by ${PR_AUTHOR}"
            exit 0
          fi

          echo "::error::Immutable path modifications require Constitutional Convention bypass."
          echo "Bypass requires BOTH:"
          echo "  - PR authored by a human in AUTHORIZED_HUMANS (see .github/workflows/ci.yml)"
          echo "  - 'constitutional-convention' label applied to the PR"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 6: Dialyzer type checking
  # ---------------------------------------------------------------------------
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: krait_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache Cargo registry + NIF target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/krait_analyzer/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/krait_analyzer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nif-

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Create PLTs dir
        run: mkdir -p priv/plts

      - name: Build PLT
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format github

  # ---------------------------------------------------------------------------
  # Job 7: Dockerfile pinning check
  # ---------------------------------------------------------------------------
  dockerfile-check:
    name: Dockerfile Pinning Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile base image pinning
        run: |
          for f in docker/Dockerfile.*; do
            if grep -E '^FROM ' "$f" | grep -v '@' | grep -v '^FROM scratch'; then
              echo "ERROR: $f has unpinned FROM" && exit 1
            fi
          done
          echo "All Dockerfiles use pinned base images"
